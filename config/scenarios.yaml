      # 任务需求参数
      - name: "clearance_area"
        name_en: "Clearance Area"
        type: "mission"
        min_value: 1
        max_value: 100
        default_value: 25
        description: "清扫面积(平方公里)"
        is_benefit: true

      - name: "safety_level"
        name_en: "Safety Level"
        type: "mission"
        min_value: 0.8
        max_value: 1.0
        default_value: 0.95
        description: "安全等级要求"
        is_benefit: true

      - name: "operational_tempo"
        name_en: "Operational Tempo"
        type: "mission"
        min_value: 6
        max_value: 48
        default_value: 18
        description: "作战节奏(小时完成时间)"
        is_benefit: false

  underwater_surveillance:
    name: "近岸水下监视"
    name_en: "Underwater Surveillance"
    description: "评估近岸水下监视作战体系的效能"
    parameters:
      # 兵力配置参数
      - name: "submarine_force"
        name_en: "Submarine Force"
        type: "force"
        min_value: 1
        max_value: 10
        default_value: 4
        description: "潜艇数量"
        is_benefit: true

      - name: "surface_vessels"
        name_en: "Surface Vessels"
        type: "force"
        min_value: 5
        max_value: 30
        default_value: 15
        description: "水面舰船数量"
        is_benefit: true

      - name: "maritime_patrol"
        name_en: "Maritime Patrol"
        type: "force"
        min_value: 2
        max_value: 20
        default_value: 8
        description: "海上巡逻机架次"
        is_benefit: true

      - name: "sensor_operators"
        name_en: "Sensor Operators"
        type: "force"
        min_value: 20
        max_value: 200
        default_value: 80
        description: "传感器操作员数量"
        is_benefit: true

      # 装备性能参数
      - name: "sonar_array_effectiveness"
        name_en: "Sonar Array Effectiveness"
        type: "equipment"
        min_value: 0.3
        max_value: 1.0
        default_value: 0.8
        description: "声纳阵列效能"
        is_benefit: true

      - name: "signal_processing"
        name_en: "Signal Processing"
        type: "equipment"
        min_value: 0.4
        max_value: 1.0
        default_value: 0.85
        description: "信号处理能力"
        is_benefit: true

      - name: "data_fusion"
        name_en: "Data Fusion"
        type: "equipment"
        min_value: 0.3
        max_value: 1.0
        default_value: 0.7
        description: "数据融合能力"
        is_benefit: true

      - name: "communication_security"
        name_en: "Communication Security"
        type: "equipment"
        min_value: 0.5
        max_value: 1.0
        default_value: 0.9
        description: "通信安全性"
        is_benefit: true

      # 环境条件参数
      - name: "water_clarity"
        name_en: "Water Clarity"
        type: "environment"
        min_value: 0.1
        max_value: 1.0
        default_value: 0.6
        description: "水质清晰度"
        is_benefit: true

      - name: "bathymetry_complexity"
