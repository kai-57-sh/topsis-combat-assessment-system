        min_value: 1
        max_value: 10
        default_value: 5
        description: "海底地形复杂度(1-最简单,10-最复杂)"
        is_benefit: false

      - name: "ambient_noise"
        name_en: "Ambient Noise"
        type: "environment"
        min_value: 0.1
        max_value: 1.0
        default_value: 0.4
        description: "环境噪声水平"
        is_benefit: false

      # 任务需求参数
      - name: "coverage_area"
        name_en: "Coverage Area"
        type: "mission"
        min_value: 100
        max_value: 5000
        default_value: 1000
        description: "覆盖面积(平方公里)"
        is_benefit: true

      - name: "detection_probability"
        name_en: "Detection Probability"
        type: "mission"
        min_value: 0.6
        max_value: 0.95
        default_value: 0.85
        description: "探测概率要求"
        is_benefit: true

      - name: "false_alarm_rate"
        name_en: "False Alarm Rate"
        type: "mission"
        min_value: 0.01
        max_value: 0.2
        default_value: 0.05
        description: "虚警率要求"
        is_benefit: false